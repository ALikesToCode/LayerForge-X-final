project:
  name: LayerForge-X-Full
  seed: 7
io:
  max_side: 1536
  save_contact_sheet: true
  save_parallax_gif: true
segmentation:
  method: grounded_sam2
  prompts: [person, animal, vehicle, furniture, plant, building, road, sky, water, window, door, laptop, phone, bag, food, text]
  min_area_ratio: 0.001
  nms_iou: 0.80
  slic_segments: 128
  slic_compactness: 10.0
  add_background_segment: true
  model:
    mask2former: facebook/mask2former-swin-large-coco-panoptic
    grounding_dino: IDEA-Research/grounding-dino-base
    sam2: facebook/sam2.1-hiera-large
    box_threshold: 0.25
    text_threshold: 0.22
depth:
  method: ensemble
  near_is_smaller: true
  flip: false
  edge_smooth: true
  ensemble: [depth_pro, depth_anything_v2, marigold]
  model:
    depth_pro: apple/DepthPro-hf
    depth_anything_v2: depth-anything/Depth-Anything-V2-Large-hf
    marigold: prs-eth/marigold-depth-v1-1
layering:
  min_layer_area_ratio: 0.001
  max_layers: 80
  split_stuff_depth_bins: 4
  occlusion_boundary_width: 7
  occlusion_depth_threshold: 0.018
  min_shared_boundary_px: 10
  amodal_enabled: true
  amodal_expand_px: 22
matting:
  alpha_band_px: 11
  preserve_depth_edges: true
transparent:
  backend: heuristic
  model: ZhengPeng7/BiRefNet-matting
  backend_max_side: 1024
  backend_crop_expand_px: 64
  backend_support_expand_px: 16
  backend_respect_support_mask: true
  backend_prefer_half: true
  backend_blend_weight: 0.8
inpainting:
  method: lama
  radius: 5
intrinsics:
  method: retinex
  sigma: 32.0
  external_command: ""
target_selection:
  backend: auto
  candidate_limit: 6
  gemini_model: gemini-2.5-flash
  gemini_max_side: 1024
  gemini_timeout_sec: 180
qwen:
  min_alpha: 0.02
  preserve_external_order: false
  merge_external_layers: false
peeling:
  max_layers: 6
  min_remaining_foreground_ratio: 0.001
effects:
  enabled: true
  dilate_px: 24
  inner_dilate_px: 4
  support_dilate_px: 14
  support_inpaint_radius: 5
  use_provided_reference: false
  delta_threshold: 0.05
  alpha_scale: 0.18
  min_area_px: 80
  prefer_downward: true
  alpha_backend: heuristic
  alpha_backend_model: ZhengPeng7/BiRefNet-matting
  alpha_backend_max_side: 1024
  alpha_backend_crop_expand_px: 64
  alpha_backend_support_expand_px: 18
  alpha_backend_respect_support_mask: true
  alpha_backend_prefer_half: true
  alpha_backend_weight: 0.8
render:
  parallax_frames: 32
  parallax_pixels: 36
