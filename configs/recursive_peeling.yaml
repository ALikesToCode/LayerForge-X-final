project:
  name: LayerForge-X-RecursivePeeling
  seed: 7
io:
  max_side: 1536
  save_contact_sheet: true
  save_parallax_gif: false
segmentation:
  method: grounded_sam2
  prompts: []
  prompt_source: manual
  min_area_ratio: 0.001
  nms_iou: 0.80
  slic_segments: 128
  slic_compactness: 10.0
  add_background_segment: true
  model:
    gemini: gemini-3-flash-preview
    gemini_max_layers: 14
    gemini_max_side: 1024
    gemini_timeout_sec: 300
    grounding_dino: IDEA-Research/grounding-dino-base
    sam2: facebook/sam2.1-hiera-large
    box_threshold: 0.24
    text_threshold: 0.20
depth:
  method: ensemble
  near_is_smaller: true
  flip: false
  edge_smooth: true
  ensemble: [depth_pro, depth_anything_v2, marigold]
  model:
    depth_pro: apple/DepthPro-hf
    depth_anything_v2: depth-anything/Depth-Anything-V2-Large-hf
    marigold: prs-eth/marigold-depth-v1-1
layering:
  min_layer_area_ratio: 0.001
  max_layers: 64
  split_stuff_depth_bins: 3
  occlusion_boundary_width: 7
  occlusion_depth_threshold: 0.018
  min_shared_boundary_px: 10
  amodal_enabled: true
  amodal_expand_px: 22
  ordering_method: boundary
  merge_enabled: true
  merge_depth_threshold: 0.05
  merge_color_threshold: 0.20
  merge_spatial_gap_px: 26
matting:
  alpha_band_px: 11
  preserve_depth_edges: true
transparent:
  backend: auto
  model: ZhengPeng7/BiRefNet-matting
  backend_max_side: 1024
  backend_crop_expand_px: 48
  backend_support_expand_px: 12
  backend_respect_support_mask: true
  backend_prefer_half: true
  backend_blend_weight: 0.75
inpainting:
  method: lama
  radius: 5
intrinsics:
  method: retinex
  sigma: 32.0
target_selection:
  backend: auto
  candidate_limit: 6
  gemini_model: gemini-2.5-flash
  gemini_max_side: 1024
  gemini_timeout_sec: 180
  infer_prompt_from_geometry: true
  geometry_prompt_backend: auto
  siglip_model: google/siglip2-base-patch16-224
qwen:
  min_alpha: 0.02
  preserve_external_order: false
  merge_external_layers: false
peeling:
  max_layers: 8
  min_remaining_foreground_ratio: 0.0008
effects:
  enabled: true
  dilate_px: 28
  inner_dilate_px: 4
  support_dilate_px: 16
  support_inpaint_radius: 5
  use_provided_reference: false
  delta_threshold: 0.04
  alpha_scale: 0.16
  min_area_px: 80
  prefer_downward: true
  candidate_backend: residual_shape
  candidate_support_px: 96
  shape_completion_enabled: true
  shape_completion_method: convex_hull
  shape_completion_support_px: 96
  shape_completion_max_area_ratio: 2.25
  shape_completion_alpha_quantile: 0.5
  shape_completion_min_alpha: 0.08
  fill_completed_rgb: true
  alpha_backend: heuristic
  alpha_backend_model: ZhengPeng7/BiRefNet-matting
  alpha_backend_max_side: 1024
  alpha_backend_crop_expand_px: 48
  alpha_backend_support_expand_px: 16
  alpha_backend_respect_support_mask: true
  alpha_backend_prefer_half: true
  alpha_backend_weight: 0.8
render:
  parallax_frames: 32
  parallax_pixels: 36
