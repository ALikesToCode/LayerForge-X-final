name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Static compile check
        run: python -m compileall src scripts tests

      - name: Rebuild site data
        run: python scripts/build_site_data.py

      - name: Verify report build entrypoint
        run: python scripts/build_report_docx.py --help

      - name: Run test suite
        run: pytest -q
