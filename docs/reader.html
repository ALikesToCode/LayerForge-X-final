<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>LayerForge-X Document</title>
        <meta
            name="description"
            content="Rendered LayerForge-X markdown document on the GitHub Pages website."
        />
        <meta property="og:title" content="LayerForge-X Document" />
        <meta
            property="og:description"
            content="Website reader for LayerForge-X markdown documents."
        />
        <meta property="og:image" content="assets/brand/layerforge-logo.png" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="assets/brand/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="assets/brand/favicon-16x16.png"
        />
        <link rel="shortcut icon" href="assets/brand/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="assets/brand/apple-touch-icon.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/site.css" />
    </head>
    <body data-page="reader">
        <header class="site-shell">
            <nav class="site-nav">
                <a class="brandmark" href="./" aria-label="LayerForge-X home">
                    <img
                        class="brandmark__icon"
                        src="assets/brand/layerforge-mark.png"
                        alt=""
                    />
                    <span class="brandmark__text"
                        >LayerForge-<span class="brand-x">X</span></span
                    >
                </a>
                <div class="site-nav__links">
                    <a href="index.html">Project site</a>
                    <a href="about.html">About</a>
                    <a href="webui.html">Local Web UI</a>
                    <a href="documents.html">Documents</a>
                </div>
            </nav>
        </header>

        <main class="site-shell reader-layout">
            <section class="section-block reader-head">
                <p class="eyebrow">Rendered markdown</p>
                <h1 id="reader-title">Loading document...</h1>
                <p class="reader-meta" id="reader-meta"></p>
                <div class="cta-row">
                    <a class="button-link button-link--secondary" href="documents.html"
                        >Markdown library</a
                    >
                    <a
                        class="button-link button-link--secondary"
                        id="reader-source-link"
                        href="#"
                        hidden
                        >View source on GitHub</a
                    >
                </div>
            </section>

            <article class="section-block markdown-body" id="reader-body">
                <p>Loading markdown source...</p>
            </article>
        </main>

        <script src="assets/site.js" defer></script>
    </body>
</html>
