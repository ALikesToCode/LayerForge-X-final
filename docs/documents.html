        <meta property="og:title" content="LayerForge-X Markdown Library" />
        <meta
            property="og:description"
            content="Browse every tracked LayerForge-X markdown document from one website page."

        <meta property="og:image" content="assets/brand/layerforge-logo.png" />
        <link
            rel="icon"
            type="image/png"

            href="assets/brand/favicon-32x32.png"

        <link

            rel="apple-touch-icon"
            sizes="180x180"

        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/site.css" />

    <body data-page="documents">
        <header class="site-shell">
            <nav class="site-nav">
                <a class="brandmark" href="./" aria-label="LayerForge-X home">
                    <img
                        class="brandmark__icon"
                        src="assets/brand/layerforge-mark.png"

                    />

                    <a href="documents.html">Documents</a>

            <section class="hero-panel hero-panel--compact">
                <div class="hero-panel__copy">
                    <p class="eyebrow">Documentation surface</p>
                    <h1>Markdown library</h1>
                    <p class="lede">
                        This page exposes the full tracked Markdown corpus for
                        LayerForge-X. Files under <code>docs/</code> open as
                        GitHub Pages documents, while repository references

                </div>
                <aside class="hero-panel__metrics" id="markdown-metrics"></aside>
            </section>

            <div id="markdown-library"></div>
        </main>

        <script src="assets/site.js" defer></script>
