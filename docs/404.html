<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>LayerForge-X Document Redirect</title>
        <script>
            (function redirectMarkdownRequests() {
                const pathname = window.location.pathname;
                if (!pathname.toLowerCase().endsWith(".md")) return;

                const knownProjectRoot = "/LayerForge-X-final/";
                let root = "/";
                let requestedPath = pathname.replace(/^\/+/, "");

                if (pathname.startsWith(knownProjectRoot)) {
                    root = knownProjectRoot;
                    requestedPath = pathname.slice(knownProjectRoot.length);
                }

                if (requestedPath) {
                    window.location.replace(
                        `${root}reader.html?path=${encodeURIComponent(requestedPath)}`,
                    );
                }
            })();
        </script>
        <meta
            name="description"
            content="LayerForge-X page not found or markdown redirect."
        />
        <meta property="og:title" content="LayerForge-X" />
        <meta property="og:image" content="assets/brand/layerforge-logo.png" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="assets/brand/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="assets/brand/favicon-16x16.png"
        />
        <link rel="shortcut icon" href="assets/brand/favicon.ico" />
        <link rel="stylesheet" href="assets/site.css" />
    </head>
    <body>
        <header class="site-shell">
            <nav class="site-nav">
                <a class="brandmark" href="./" aria-label="LayerForge-X home">
                    <img
                        class="brandmark__icon"
                        src="assets/brand/layerforge-mark.png"
                        alt=""
                    />
                    <span class="brandmark__text"
                        >LayerForge-<span class="brand-x">X</span></span
                    >
                </a>
                <div class="site-nav__links">
                    <a href="index.html">Project site</a>
                    <a href="documents.html">Documents</a>
                </div>
            </nav>
        </header>
        <main class="site-shell reader-layout">
            <section class="section-block prose-block">
                <p class="eyebrow">Missing page</p>
                <h1>Document not found</h1>
                <p>
                    Markdown documents are rendered through the LayerForge-X
                    website reader. Open the document library to choose an
                    available page.
                </p>
                <p><a href="documents.html">Open markdown library</a></p>
            </section>
        </main>
    </body>
</html>
